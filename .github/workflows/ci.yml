name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: cp .env.example .env
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:web
      - run: docker compose config
