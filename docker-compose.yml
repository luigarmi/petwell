services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: npm run start:user-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pet-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: npm run start:pet-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started

  ehr-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: npm run start:ehr-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
      pet-service:
        condition: service_started

  appointment-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: npm run start:appointment-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
      pet-service:
        condition: service_started

  billing-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: npm run start:billing-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      appointment-service:
        condition: service_started

  telemed-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: npm run start:telemed-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      appointment-service:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: npm run start:notification-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: npm run start:analytics-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: npm run start:gateway
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_started
      pet-service:
        condition: service_started
      ehr-service:
        condition: service_started
      appointment-service:
        condition: service_started
      billing-service:
        condition: service_started
      telemed-service:
        condition: service_started
      notification-service:
        condition: service_started
      analytics-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    command: npm run start:web
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  postgres_data:
